name: Feature request
description: Propose a new capability or enhancement for octo-mail
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. For substantial changes, opening this issue to
        discuss the approach before sending a pull request saves everyone time
        (see [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md)).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and why is it hard or impossible today?
      placeholder: I need to … but octo-mail currently …
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the surface (API, config, behavior) if you can.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      description: Which part of octo-mail would this touch?
      options:
        - IMAP
        - JMAP
        - SMTP
        - REST WebAPI
        - Admin API
        - Storage / PostgreSQL
        - Blob / S3
        - Queue / delivery
        - Deliverability / anti-abuse
        - Webmail
        - Operations / HA / metrics
        - Other / cross-cutting
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why the proposal is preferable.
    validations:
      required: false
