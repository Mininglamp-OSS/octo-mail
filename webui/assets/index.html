<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>octo-mail</title>
<style>
  /* ============================================================
     octo-mail webmail — "Monochrome" design system.
     Near-achromatic neutral base (zinc ramp), emphasis carried by
     near-black/near-white fills, weight, and contrast — not hue.
     Compact, enterprise-grade density. Light-first with an automatic
     prefers-color-scheme dark mapping. No external fonts/CDN — embeds
     in the binary, runs offline.
     ============================================================ */
  :root {
    /* Surfaces (low → high elevation) */
    --bg:            #fafafa;   /* app canvas */
    --bg-sunken:     #f4f4f5;   /* sidebar, inputs */
    --bg-panel:      #ffffff;   /* list & reader panels, cards, modals */
    --bg-hover:      #f4f4f5;   /* row/nav hover */
    --bg-active:     #efeff1;   /* selected row/nav (neutral, not tinted) */
    /* Lines */
    --border:        #ececee;   /* standard hairline */
    --border-soft:   #f2f2f3;   /* inner list dividers */
    --border-strong: #d9d9dd;   /* modal edge, scrollbar, avatar ring */
    /* Text (high → low emphasis) — pure neutral ramp */
    --text:          #0a0a0b;
    --text-soft:     #5c5c66;
    --text-faint:    #9a9aa4;
    /* Emphasis — near-black; the "accent" is contrast, not color */
    --accent:        #18181b;
    --accent-strong: #000000;
    --on-accent:     #ffffff;
    --focus:         #18181b;   /* focus ring */
    /* Functional (used narrowly) */
    --danger:        #c0392b;
    --danger-ghost:  #fbecea;
    /* Neutral avatar */
    --av-bg:         #e6e6e9;
    --av-fg:         #52525b;
    /* Elevation */
    --shadow-sm: 0 1px 2px rgba(9,9,11,.06);
    --shadow-md: 0 4px 14px -3px rgba(9,9,11,.12), 0 2px 5px -2px rgba(9,9,11,.07);
    --shadow-lg: 0 20px 48px -12px rgba(9,9,11,.24), 0 6px 16px -8px rgba(9,9,11,.14);
    /* Type */
    --font-ui: ui-sans-serif, -apple-system, "Segoe UI", system-ui, "Helvetica Neue", sans-serif;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", "Consolas", monospace;
    /* Radii */
    --r-xs: 4px; --r-sm: 6px; --r-md: 9px; --r-lg: 13px; --r-pill: 999px;
    /* Spacing (4px grid) */
    --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 20px; --s6: 24px; --s8: 32px;
    /* Layout (compact) */
    --sidebar-w: 212px;
    --list-w: 344px;
    --ease: cubic-bezier(.2,.7,.2,1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:            #0a0a0b;
      --bg-sunken:     #0d0d0f;
      --bg-panel:      #121214;
      --bg-hover:      #19191c;
      --bg-active:     #202024;
      --border:        #222226;
      --border-soft:   #1a1a1d;
      --border-strong: #34343a;
      --text:          #fafafa;
      --text-soft:     #a1a1aa;
      --text-faint:    #6b6b74;
      --accent:        #fafafa;      /* near-white fill in dark */
      --accent-strong: #ffffff;
      --on-accent:     #0a0a0b;      /* dark ink on the light fill */
      --focus:         #d4d4d8;
      --danger:        #f07567;
      --danger-ghost:  #2e1a17;
      --av-bg:         #26262b;
      --av-fg:         #b0b0ba;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.5);
      --shadow-md: 0 6px 20px -4px rgba(0,0,0,.6);
      --shadow-lg: 0 24px 56px -12px rgba(0,0,0,.75);
    }
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--bg-active); color: var(--text); }

  /* Custom scrollbars — thin, quiet. */
  .scroll { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
  .scroll::-webkit-scrollbar { width: 9px; height: 9px; }
  .scroll::-webkit-scrollbar-thumb {
    background: var(--border-strong); border-radius: var(--r-pill);
    border: 3px solid transparent; background-clip: padding-box;
  }
  .scroll::-webkit-scrollbar-thumb:hover { background: var(--text-faint); background-clip: padding-box; }
  .scroll::-webkit-scrollbar-track { background: transparent; }

  /* Focus: keyboard-only rings. */
  :focus { outline: none; }
  :focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: var(--r-xs); }

  button {
    font-family: inherit; font-size: 13px; font-weight: 550;
    cursor: pointer; border: none; border-radius: var(--r-sm);
    color: inherit;
    transition: background .14s var(--ease), transform .07s var(--ease),
                box-shadow .14s var(--ease), color .14s var(--ease), border-color .14s var(--ease), opacity .14s;
  }
  button:active { transform: translateY(.5px); }
  button:disabled { opacity: .55; cursor: default; transform: none; }

  input, textarea {
    width: 100%;
    font-family: inherit; font-size: 13px; color: var(--text);
    background: var(--bg-panel);
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    padding: 9px 11px;
    transition: border-color .14s var(--ease), box-shadow .14s var(--ease);
  }
  input::placeholder, textarea::placeholder { color: var(--text-faint); }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);
  }

  /* Filled (near-black / near-white) button — the single strong action. */
  .btn-fill {
    color: var(--on-accent); background: var(--accent);
    box-shadow: var(--shadow-sm);
  }
  .btn-fill:hover:not(:disabled) { background: var(--accent-strong); }

  /* Neutral avatar (no hue) */
  .av-gradient {
    background: var(--av-bg); color: var(--av-fg);
    display: grid; place-items: center;
    font-weight: 650; letter-spacing: .01em; text-transform: uppercase;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.04);
  }

  /* ---------------- Login ---------------- */
  #login-view {
    min-height: 100vh; display: grid; place-items: center;
    padding: var(--s6); background: var(--bg);
  }
  .login-card {
    width: 100%; max-width: 360px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg);
    padding: var(--s8) 28px var(--s6);
    animation: rise .45s var(--ease) both;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .login-card .brand { margin-bottom: 26px; }
  .brand .mark {
    width: 34px; height: 34px; border-radius: var(--r-md); flex: none;
    background: var(--accent); color: var(--on-accent);
    display: grid; place-items: center; font-size: 17px;
    box-shadow: var(--shadow-sm);
  }
  .brand .name { font-size: 17px; font-weight: 680; letter-spacing: -.02em; }
  .brand .name span { color: var(--text-faint); font-weight: 400; padding: 0 1px; }
  .brand .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0; margin-top: 2px; }

  .field { margin-bottom: var(--s3); }
  .field label {
    display: block; font-size: 10px; font-weight: 650; letter-spacing: .05em;
    text-transform: uppercase; color: var(--text-faint); margin-bottom: 5px;
  }
  .btn-primary { width: 100%; padding: 10px; margin-top: var(--s2); }
  .status {
    font-size: 11.5px; color: var(--danger); min-height: 1.3em; margin-top: 9px;
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
  }
  .status.ok { color: var(--text-soft); }

  /* ---------------- App shell ---------------- */
  #mail-view { height: 100vh; display: none; grid-template-columns: var(--sidebar-w) var(--list-w) 1fr; }

  /* Sidebar */
  .sidebar {
    background: var(--bg-sunken);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; min-height: 0;
    padding: var(--s3) var(--s2);
  }
  .sidebar .brand { margin: var(--s1) var(--s2) var(--s4); }
  .sidebar .brand .mark { width: 28px; height: 28px; border-radius: var(--r-sm); font-size: 14px; }
  .sidebar .brand .name { font-size: 14.5px; }
  .compose-btn {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    width: 100%; padding: 9px; margin-bottom: var(--s4);
    font-size: 12.5px; font-weight: 600; letter-spacing: .01em;
  }
  .compose-btn .plus { font-size: 15px; line-height: 0; margin-top: -1px; }
  .nav-label {
    font-size: 9.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-faint); padding: 0 var(--s2); margin: var(--s2) 0 var(--s1);
  }
  .nav { display: flex; flex-direction: column; gap: 1px; }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 6px var(--s2); border-radius: var(--r-sm);
    color: var(--text-soft); font-weight: 500; font-size: 13px; cursor: pointer;
    transition: background .12s var(--ease), color .12s var(--ease);
  }
  .nav-item:hover { background: var(--bg-hover); color: var(--text); }
  .nav-item:focus-visible { outline: none; background: var(--bg-hover); color: var(--text); box-shadow: inset 0 0 0 1.5px var(--focus); }
  .nav-item.active { background: var(--bg-active); color: var(--text); font-weight: 620; }
  .nav-item .ico { width: 16px; text-align: center; opacity: .7; font-size: 12px; flex: none; }
  .nav-item.active .ico { opacity: 1; }
  .nav-item .lbl { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nav-item .count {
    margin-left: auto; font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    font-size: 10.5px; color: var(--text-faint);
  }
  .nav-item .count:empty { display: none; }
  .nav-item.active .count { color: var(--text-soft); }
  .sidebar-foot {
    margin-top: auto; padding: var(--s2) var(--s2) var(--s1);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: var(--s2);
  }
  .avatar { width: 28px; height: 28px; border-radius: 50%; flex: none; font-size: 11px; }
  .sidebar-foot .who { min-width: 0; }
  .sidebar-foot .who .u { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-foot .who .s { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-faint); margin-top: 1px; }
  .icon-btn {
    background: transparent; color: var(--text-faint);
    width: 28px; height: 28px; display: grid; place-items: center;
    border-radius: var(--r-sm); font-size: 14px; flex: none;
  }
  .icon-btn:hover { background: var(--bg-hover); color: var(--text); }
  .sidebar-foot .icon-btn { margin-left: auto; }

  /* Message list */
  .list-pane { background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
  .list-head {
    display: flex; align-items: center; justify-content: space-between; gap: var(--s3);
    padding: var(--s4) var(--s4) var(--s3); border-bottom: 1px solid var(--border);
  }
  .list-head h2 { margin: 0; font-size: 15px; font-weight: 680; letter-spacing: -.02em; }
  .list-head .sub { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 2px; }
  .list-scroll { overflow-y: auto; flex: 1; }
  .msg-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px var(--s4) 8px var(--s3);
    border-bottom: 1px solid var(--border-soft);
    cursor: pointer; position: relative;
    transition: background .1s var(--ease);
  }
  .msg-row::before {
    content: ""; position: absolute; left: 0; top: 5px; bottom: 5px; width: 2.5px;
    border-radius: 0 2px 2px 0; background: transparent;
    transition: background .1s var(--ease);
  }
  .msg-row:hover { background: var(--bg-hover); }
  .msg-row:hover::before { background: var(--border-strong); }
  .msg-row.active { background: var(--bg-active); }
  .msg-row.active::before { background: var(--accent); }
  .msg-row:focus-visible { outline: none; background: var(--bg-hover); }
  .msg-row:focus-visible::before { background: var(--accent); }
  .msg-row .av { width: 30px; height: 30px; border-radius: 50%; flex: none; margin-top: 1px; font-size: 11.5px; }
  .msg-row .content { min-width: 0; flex: 1; }
  .msg-row .top { display: flex; align-items: baseline; gap: var(--s2); min-width: 0; }
  .msg-row .from { font-weight: 550; font-size: 13px; color: var(--text-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .msg-row.unread .from { font-weight: 700; color: var(--text); }
  .msg-row .time {
    margin-left: auto; font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    font-size: 10px; color: var(--text-faint); white-space: nowrap; flex: none;
  }
  .msg-row .subj { font-size: 12.5px; color: var(--text-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .msg-row.unread .subj { color: var(--text); font-weight: 600; }
  .msg-row .prev { font-size: 12px; color: var(--text-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .msg-row .dot { position: absolute; right: var(--s3); top: 50%; margin-top: -3px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px var(--bg-panel); }
  .msg-row:hover .dot { box-shadow: 0 0 0 3px var(--bg-hover); }
  .msg-row.active .dot { box-shadow: 0 0 0 3px var(--bg-active); }
  .tag-junk {
    font-family: var(--font-mono); font-size: 8.5px; font-weight: 700; letter-spacing: .05em;
    color: var(--danger); background: var(--danger-ghost); border-radius: var(--r-xs);
    padding: 1px 4px; text-transform: uppercase; flex: none;
  }
  .empty { padding: 52px var(--s6); text-align: center; color: var(--text-faint); font-size: 12.5px; }
  .empty .big { font-size: 28px; opacity: .3; margin-bottom: 10px; }

  /* Reader */
  .reader-pane { background: var(--bg); display: flex; flex-direction: column; min-height: 0; }
  .reader-empty { flex: 1; display: grid; place-items: center; text-align: center; color: var(--text-faint); }
  .reader-empty .big { font-size: 52px; opacity: .14; margin-bottom: var(--s3); }
  .reader-empty .hint { font-size: 12.5px; }
  #reader { flex: 1; display: none; flex-direction: column; min-height: 0; }
  .reader-head { padding: var(--s5) var(--s6) var(--s4); border-bottom: 1px solid var(--border); background: var(--bg-panel); }
  .reader-head h1 { margin: 0 0 var(--s3); font-size: 19px; font-weight: 680; letter-spacing: -.02em; line-height: 1.3; }
  .reader-meta { display: flex; align-items: center; gap: 10px; }
  .reader-meta .av { width: 38px; height: 38px; border-radius: 50%; flex: none; font-size: 14px; }
  .reader-meta .mfrom { font-weight: 620; font-size: 13px; }
  .reader-meta .maddr { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-faint); margin-top: 1px; }
  .reader-meta .mto { margin-left: auto; text-align: right; padding-left: var(--s4); flex: none; }
  .reader-meta .mdate { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 10.5px; color: var(--text-soft); }
  .reader-meta .mrcpt { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 1px; }
  .reader-body {
    flex: 1; overflow-y: auto; padding: var(--s5) var(--s6) var(--s8);
    white-space: pre-wrap; overflow-wrap: break-word;
    font-size: 13.5px; line-height: 1.7; color: var(--text);
    max-width: 72ch;
  }

  /* Compose modal */
  .modal-scrim {
    position: fixed; inset: 0;
    background: rgba(9,9,11,.5); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    display: none; place-items: end center; z-index: 50;
    animation: fade .18s ease both;
  }
  .modal-scrim.open { display: grid; }
  .compose {
    width: 100%; max-width: 620px; margin: 0 var(--s6);
    background: var(--bg-panel); border: 1px solid var(--border-strong);
    border-radius: var(--r-lg) var(--r-lg) 0 0; box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column; max-height: 84vh;
    animation: rise .26s var(--ease) both;
  }
  .compose-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--s3) var(--s4); border-bottom: 1px solid var(--border);
  }
  .compose-head h3 { margin: 0; font-size: 14px; font-weight: 680; letter-spacing: -.01em; }
  .compose-body { padding: 0 var(--s4); overflow-y: auto; }
  .compose-body .line { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-soft); }
  .compose-body .line label {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: .04em;
    text-transform: uppercase; color: var(--text-faint); width: 52px; flex: none;
  }
  .compose-body .line input { border: none; background: transparent; padding: 11px 0; border-radius: 0; }
  .compose-body .line input:focus { box-shadow: none; }
  .compose-body textarea {
    border: none; background: transparent; padding: var(--s3) 0; min-height: 200px; resize: vertical;
    line-height: 1.6; font-size: 13.5px;
  }
  .compose-body textarea:focus { box-shadow: none; }
  .compose-foot { display: flex; align-items: center; gap: var(--s3); padding: var(--s3) var(--s4); border-top: 1px solid var(--border); }
  .btn-send { padding: 9px 20px; display: flex; align-items: center; gap: 7px; }
  .btn-ghost { padding: 9px 14px; background: transparent; color: var(--text-soft); }
  .btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
  .compose .status { margin: 0 0 0 auto; }

  .spinner {
    width: 14px; height: 14px; border: 2px solid currentColor; border-right-color: transparent;
    border-radius: 50%; display: inline-block; animation: spin .6s linear infinite; vertical-align: -2px;
  }

  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg-row { animation: rise .24s var(--ease) both; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
  }

  @media (max-width: 900px) { :root { --list-w: 300px; } }
  @media (max-width: 720px) {
    #mail-view { grid-template-columns: 1fr; }
    .sidebar, .list-pane { display: none; }
  }
</style>
</head>
<body>

<div id="login-view">
  <div class="login-card">
    <div class="brand">
      <div class="mark">✦</div>
      <div>
        <div class="name">octo<span>·</span>mail</div>
        <div class="tag">change-log mail kernel</div>
      </div>
    </div>
    <div class="field">
      <label for="user">Email</label>
      <input id="user" type="text" placeholder="you@example.com" autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label for="pass">Password</label>
      <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button id="login-btn" class="btn-fill btn-primary">Sign in</button>
    <div id="login-status" class="status"></div>
  </div>
</div>

<div id="mail-view">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">✦</div>
      <div class="name">octo<span>·</span>mail</div>
    </div>
    <button id="compose-open" class="btn-fill compose-btn"><span class="plus">+</span> Compose</button>
    <div class="nav-label">Mailboxes</div>
    <div id="nav" class="nav"></div>
    <div class="sidebar-foot">
      <div id="side-avatar" class="avatar av-gradient">?</div>
      <div class="who">
        <div id="side-user" class="u">—</div>
        <div class="s">signed in</div>
      </div>
      <button id="signout-btn" class="icon-btn" title="Sign out">⏻</button>
    </div>
  </aside>

  <!-- Message list -->
  <section class="list-pane">
    <div class="list-head">
      <div>
        <h2 id="list-title">Inbox</h2>
        <div id="list-sub" class="sub">—</div>
      </div>
      <button id="refresh-btn" class="icon-btn" title="Refresh">↻</button>
    </div>
    <div id="list" class="list-scroll scroll"></div>
  </section>

  <!-- Reader -->
  <section class="reader-pane">
    <div id="reader-empty" class="reader-empty">
      <div>
        <div class="big">✉</div>
        <div class="hint">Select a message to read</div>
      </div>
    </div>
    <div id="reader">
      <div class="reader-head">
        <h1 id="reader-subject"></h1>
        <div class="reader-meta">
          <div id="reader-av" class="av av-gradient">?</div>
          <div>
            <div id="reader-from" class="mfrom"></div>
            <div id="reader-fromaddr" class="maddr"></div>
          </div>
          <div id="reader-to" class="mto">
            <div id="reader-date" class="mdate"></div>
            <div id="reader-rcpt" class="mrcpt"></div>
          </div>
        </div>
      </div>
      <div id="reader-body" class="reader-body scroll"></div>
    </div>
  </section>
</div>

<!-- Compose modal -->
<div id="compose-scrim" class="modal-scrim">
  <div class="compose">
    <div class="compose-head">
      <h3>New message</h3>
      <button id="compose-close" class="icon-btn">✕</button>
    </div>
    <div class="compose-body scroll">
      <div class="line"><label for="to">To</label><input id="to" type="text" placeholder="recipient@example.com"></div>
      <div class="line"><label for="subject">Subject</label><input id="subject" type="text" placeholder="Subject"></div>
      <textarea id="compose-text" placeholder="Write your message…"></textarea>
    </div>
    <div class="compose-foot">
      <button id="send-btn" class="btn-fill btn-send">Send</button>
      <button id="compose-cancel" class="btn-ghost">Discard</button>
      <div id="send-status" class="status"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
