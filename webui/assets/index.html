<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>octo-mail</title>
<style>
  /* ============================================================
     octo-mail webmail — "ink & tide" design system
     Teal/slate palette · 4px spacing grid · monospace for machine
     metadata. Light-first with an automatic prefers-color-scheme dark
     mapping. No external fonts/CDN — embeds in the binary, runs offline.
     ============================================================ */
  :root {
    /* Surfaces (low → high elevation) */
    --bg:            #eef1f4;
    --bg-sunken:     #e7ebef;
    --bg-panel:      #ffffff;
    --bg-hover:      #eef4f3;
    --bg-active:     #dcefec;
    /* Lines */
    --border:        #e4e8ec;
    --border-soft:   #edf0f3;
    --border-strong: #ccd3d9;
    /* Text (high → low emphasis) */
    --text:          #16262c;
    --text-soft:     #566871;
    --text-faint:    #859399;
    /* Brand */
    --accent:        #0d7d76;
    --accent-strong: #0a615c;
    --accent-soft:   #128f87;
    --accent-ghost:  #e2f1ef;
    --on-accent:     #ffffff;
    --danger:        #b4453a;
    --danger-ghost:  #f6e6e4;
    /* Avatar gradient (adapts in dark) */
    --av-1:          #4b8f89;
    --av-2:          #2f6c66;
    /* Elevation */
    --shadow-sm: 0 1px 2px rgba(18,38,43,.07);
    --shadow-md: 0 6px 20px -4px rgba(18,38,43,.14), 0 2px 6px -2px rgba(18,38,43,.08);
    --shadow-lg: 0 24px 60px -12px rgba(18,38,43,.28), 0 8px 20px -8px rgba(18,38,43,.16);
    /* Type */
    --font-ui: ui-sans-serif, -apple-system, "Segoe UI", system-ui, "Helvetica Neue", sans-serif;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", "Consolas", monospace;
    /* Radii */
    --r-xs: 5px; --r-sm: 8px; --r-md: 11px; --r-lg: 16px; --r-pill: 999px;
    /* Spacing (4px grid) */
    --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 20px; --s6: 24px; --s8: 32px;
    /* Layout */
    --sidebar-w: 244px;
    --list-w: 372px;
    --ease: cubic-bezier(.2,.8,.2,1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:            #0d1417;
      --bg-sunken:     #0a1013;
      --bg-panel:      #141d21;
      --bg-hover:      #1a262b;
      --bg-active:     #143430;
      --border:        #222d33;
      --border-soft:   #1a2429;
      --border-strong: #33434b;
      --text:          #e8eef1;
      --text-soft:     #a3b3ba;
      --text-faint:    #6a7b83;
      --accent:        #2bb3a8;
      --accent-strong: #52ccc1;
      --accent-soft:   #35c0b4;
      --accent-ghost:  #123330;
      --on-accent:     #06201e;
      --danger:        #e88478;
      --danger-ghost:  #331d1a;
      --av-1:          #2f6c66;
      --av-2:          #1f4a45;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
      --shadow-md: 0 8px 24px -6px rgba(0,0,0,.55);
      --shadow-lg: 0 28px 64px -12px rgba(0,0,0,.7);
    }
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent-ghost); color: var(--text); }
  .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

  /* Custom scrollbars — thin, quiet, themed. */
  .scroll { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
  .scroll::-webkit-scrollbar { width: 10px; height: 10px; }
  .scroll::-webkit-scrollbar-thumb {
    background: var(--border-strong); border-radius: var(--r-pill);
    border: 3px solid transparent; background-clip: padding-box;
  }
  .scroll::-webkit-scrollbar-thumb:hover { background: var(--text-faint); background-clip: padding-box; }
  .scroll::-webkit-scrollbar-track { background: transparent; }

  /* Focus: keyboard-only rings, never on mouse click. */
  :focus { outline: none; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-xs); }

  button {
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; border-radius: var(--r-sm);
    color: inherit;
    transition: background .15s var(--ease), transform .08s var(--ease),
                box-shadow .15s var(--ease), color .15s var(--ease), opacity .15s;
  }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: .6; cursor: default; transform: none; }

  input, textarea {
    width: 100%;
    font-family: inherit; font-size: 14px; color: var(--text);
    background: var(--bg-sunken);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 10px 12px;
    transition: border-color .15s var(--ease), box-shadow .15s var(--ease), background .15s var(--ease);
  }
  input::placeholder, textarea::placeholder { color: var(--text-faint); }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg-panel);
    box-shadow: 0 0 0 3px var(--accent-ghost);
  }

  /* Shared avatar */
  .av-gradient {
    background: linear-gradient(150deg, var(--av-1), var(--av-2));
    color: #fff;
    display: grid; place-items: center;
    font-weight: 650; letter-spacing: .01em;
    text-transform: uppercase;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
  }

  /* ---------------- Login ---------------- */
  #login-view {
    min-height: 100vh;
    display: grid; place-items: center;
    padding: var(--s6);
    background:
      radial-gradient(130% 90% at 12% -12%, var(--accent-ghost) 0%, transparent 52%),
      radial-gradient(100% 80% at 112% 114%, var(--accent-ghost) 0%, transparent 48%),
      var(--bg);
  }
  .login-card {
    width: 100%; max-width: 384px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg);
    padding: var(--s8) var(--s8) var(--s6);
    animation: rise .5s var(--ease) both;
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .login-card .brand { margin-bottom: var(--s6); }
  .brand .mark {
    width: 40px; height: 40px; border-radius: var(--r-md); flex: none;
    background: linear-gradient(145deg, var(--accent-soft), var(--accent-strong));
    display: grid; place-items: center;
    color: #fff; font-size: 20px;
    box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,.18);
  }
  .brand .name { font-size: 19px; font-weight: 700; letter-spacing: -.015em; }
  .brand .name span { color: var(--accent); font-weight: 400; padding: 0 1px; }
  .brand .tag { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-faint); letter-spacing: .01em; margin-top: 2px; }

  .field { margin-bottom: var(--s4); }
  .field label {
    display: block; font-size: 10.5px; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px;
  }
  .btn-primary {
    width: 100%; padding: 11px; margin-top: var(--s1);
    color: var(--on-accent); background: var(--accent);
    box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,.14);
  }
  .btn-primary:hover:not(:disabled) { background: var(--accent-strong); }
  .status {
    font-size: 12px; color: var(--danger); min-height: 1.3em; margin-top: 10px;
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
  }
  .status.ok { color: var(--accent); }

  /* ---------------- App shell ---------------- */
  #mail-view { height: 100vh; display: none; grid-template-columns: var(--sidebar-w) var(--list-w) 1fr; }

  /* Sidebar */
  .sidebar {
    background: var(--bg-sunken);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; min-height: 0;
    padding: var(--s4) var(--s3);
  }
  .sidebar .brand { margin: var(--s1) var(--s2) var(--s5); }
  .sidebar .brand .mark { width: 32px; height: 32px; border-radius: var(--r-sm); font-size: 16px; }
  .sidebar .brand .name { font-size: 16px; }
  .compose-btn {
    display: flex; align-items: center; justify-content: center; gap: var(--s2);
    width: 100%; padding: 11px; margin-bottom: var(--s5);
    color: var(--on-accent); background: var(--accent);
    box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,.14);
    font-size: 13.5px; letter-spacing: .01em;
  }
  .compose-btn:hover:not(:disabled) { background: var(--accent-strong); box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,.14); }
  .compose-btn .plus { font-size: 18px; line-height: 0; margin-top: -1px; }
  .nav-label {
    font-size: 10px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
    color: var(--text-faint); padding: 0 var(--s3); margin: var(--s2) 0 6px;
  }
  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 9px var(--s3); border-radius: var(--r-sm);
    color: var(--text-soft); font-weight: 550; font-size: 13.5px; cursor: pointer;
    transition: background .13s var(--ease), color .13s var(--ease);
  }
  .nav-item:hover { background: var(--bg-hover); color: var(--text); }
  .nav-item.active { background: var(--bg-active); color: var(--accent-strong); font-weight: 650; }
  .nav-item .ico { width: 18px; text-align: center; opacity: .8; font-size: 13px; flex: none; }
  .nav-item.active .ico { opacity: 1; }
  .nav-item .lbl { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nav-item .count {
    margin-left: auto; font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    font-size: 11px; color: var(--text-faint);
    background: var(--bg-active); padding: 1px 7px; border-radius: var(--r-pill); min-width: 20px; text-align: center;
  }
  .nav-item .count:empty { display: none; }
  .nav-item.active .count { color: var(--accent-strong); }
  .sidebar-foot {
    margin-top: auto; padding: var(--s3) var(--s2) var(--s1);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .avatar { width: 32px; height: 32px; border-radius: 50%; flex: none; font-size: 12.5px; }
  .sidebar-foot .who { min-width: 0; }
  .sidebar-foot .who .u { font-size: 12.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-foot .who .s { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 1px; }
  .icon-btn {
    background: transparent; color: var(--text-faint);
    width: 30px; height: 30px; display: grid; place-items: center;
    border-radius: var(--r-sm); font-size: 15px; flex: none;
  }
  .icon-btn:hover { background: var(--bg-hover); color: var(--text); }
  .sidebar-foot .icon-btn { margin-left: auto; }

  /* Message list */
  .list-pane { background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
  .list-head {
    display: flex; align-items: center; justify-content: space-between; gap: var(--s3);
    padding: var(--s5) var(--s5) var(--s3); border-bottom: 1px solid var(--border);
  }
  .list-head h2 { margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -.02em; }
  .list-head .sub { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-faint); margin-top: 3px; letter-spacing: .01em; }
  .list-scroll { overflow-y: auto; flex: 1; }
  .msg-row {
    display: flex; align-items: flex-start; gap: var(--s3);
    padding: 13px var(--s5) 13px var(--s4);
    border-bottom: 1px solid var(--border-soft);
    cursor: pointer; position: relative;
    transition: background .12s var(--ease);
  }
  .msg-row::before {
    content: ""; position: absolute; left: 0; top: 6px; bottom: 6px; width: 3px;
    border-radius: 0 3px 3px 0; background: transparent;
    transition: background .12s var(--ease);
  }
  .msg-row:hover { background: var(--bg-hover); }
  .msg-row.active { background: var(--bg-active); }
  .msg-row.active::before { background: var(--accent); }
  .msg-row .av { width: 38px; height: 38px; border-radius: 50%; flex: none; margin-top: 1px; font-size: 14px; }
  .msg-row .content { min-width: 0; flex: 1; }
  .msg-row .top { display: flex; align-items: baseline; gap: var(--s2); min-width: 0; margin-bottom: 2px; }
  .msg-row .from { font-weight: 600; font-size: 13.5px; color: var(--text-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .msg-row.unread .from { font-weight: 720; color: var(--text); }
  .msg-row .time {
    margin-left: auto; font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    font-size: 10.5px; color: var(--text-faint); white-space: nowrap; flex: none;
  }
  .msg-row .subj { font-size: 13px; color: var(--text-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 1px; }
  .msg-row.unread .subj { color: var(--text); font-weight: 600; }
  .msg-row .prev { font-size: 12px; color: var(--text-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .msg-row .dot { position: absolute; right: var(--s4); top: 50%; margin-top: -3.5px; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px var(--bg-panel); }
  .msg-row:hover .dot, .msg-row.active .dot { box-shadow: 0 0 0 3px var(--bg-active); }
  .tag-junk {
    font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: .05em;
    color: var(--danger); background: var(--danger-ghost); border-radius: var(--r-xs);
    padding: 1px 5px; text-transform: uppercase; flex: none;
  }
  .empty { padding: 56px var(--s6); text-align: center; color: var(--text-faint); font-size: 13px; }
  .empty .big { font-size: 32px; opacity: .3; margin-bottom: 12px; }

  /* Reader */
  .reader-pane { background: var(--bg); display: flex; flex-direction: column; min-height: 0; }
  .reader-empty { flex: 1; display: grid; place-items: center; text-align: center; color: var(--text-faint); }
  .reader-empty .big { font-size: 60px; opacity: .16; margin-bottom: var(--s4); }
  .reader-empty .hint { font-size: 13px; letter-spacing: .01em; }
  #reader { flex: 1; display: none; flex-direction: column; min-height: 0; }
  .reader-head { padding: var(--s6) var(--s8) var(--s5); border-bottom: 1px solid var(--border); background: var(--bg-panel); }
  .reader-head h1 { margin: 0 0 var(--s4); font-size: 22px; font-weight: 700; letter-spacing: -.02em; line-height: 1.28; }
  .reader-meta { display: flex; align-items: center; gap: var(--s3); }
  .reader-meta .av { width: 44px; height: 44px; border-radius: 50%; flex: none; font-size: 16px; }
  .reader-meta .mfrom { font-weight: 650; font-size: 14px; }
  .reader-meta .maddr { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  .reader-meta .mto {
    margin-left: auto; font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    font-size: 10.5px; color: var(--text-faint); text-align: right; padding-left: var(--s4);
  }
  .reader-body {
    flex: 1; overflow-y: auto; padding: var(--s6) var(--s8) var(--s8);
    white-space: pre-wrap; overflow-wrap: break-word;
    font-size: 14.5px; line-height: 1.72; color: var(--text);
    max-width: 74ch;
  }

  /* Compose modal */
  .modal-scrim {
    position: fixed; inset: 0;
    background: rgba(10,18,21,.5); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    display: none; place-items: end center; z-index: 50;
    animation: fade .2s ease both;
  }
  .modal-scrim.open { display: grid; }
  .compose {
    width: 100%; max-width: 660px; margin: 0 var(--s6);
    background: var(--bg-panel); border: 1px solid var(--border-strong);
    border-radius: var(--r-lg) var(--r-lg) 0 0; box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column; max-height: 84vh;
    animation: rise .3s var(--ease) both;
  }
  .compose-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--s4) var(--s5); border-bottom: 1px solid var(--border);
  }
  .compose-head h3 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -.01em; }
  .compose-body { padding: 0 var(--s5); overflow-y: auto; }
  .compose-body .line { display: flex; align-items: center; gap: var(--s3); border-bottom: 1px solid var(--border-soft); }
  .compose-body .line label {
    font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; letter-spacing: .04em;
    text-transform: uppercase; color: var(--text-faint); width: 56px; flex: none;
  }
  .compose-body .line input { border: none; background: transparent; padding: 13px 0; border-radius: 0; }
  .compose-body .line input:focus { box-shadow: none; }
  .compose-body textarea {
    border: none; background: transparent; padding: var(--s4) 0; min-height: 210px; resize: vertical;
    line-height: 1.6; font-size: 14.5px;
  }
  .compose-body textarea:focus { box-shadow: none; }
  .compose-foot { display: flex; align-items: center; gap: var(--s3); padding: var(--s3) var(--s5); border-top: 1px solid var(--border); }
  .btn-send {
    padding: 10px 22px; color: var(--on-accent); background: var(--accent);
    box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,.14);
    display: flex; align-items: center; gap: 7px;
  }
  .btn-send:hover:not(:disabled) { background: var(--accent-strong); }
  .btn-ghost { padding: 10px 16px; background: transparent; color: var(--text-soft); }
  .btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
  .compose .status { margin: 0 0 0 auto; }

  .spinner {
    width: 15px; height: 15px; border: 2px solid currentColor; border-right-color: transparent;
    border-radius: 50%; display: inline-block; animation: spin .6s linear infinite; vertical-align: -2px;
  }

  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg-row { animation: rise .28s var(--ease) both; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
  }

  @media (max-width: 900px) {
    :root { --list-w: 320px; }
  }
  @media (max-width: 760px) {
    #mail-view { grid-template-columns: 1fr; }
    .sidebar, .list-pane { display: none; }
  }
</style>
</head>
<body>

<div id="login-view">
  <div class="login-card">
    <div class="brand">
      <div class="mark">✦</div>
      <div>
        <div class="name">octo<span>·</span>mail</div>
        <div class="tag">change-log mail kernel</div>
      </div>
    </div>
    <div class="field">
      <label for="user">Email</label>
      <input id="user" type="text" placeholder="you@example.com" autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label for="pass">Password</label>
      <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button id="login-btn" class="btn-primary">Sign in</button>
    <div id="login-status" class="status"></div>
  </div>
</div>

<div id="mail-view">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">✦</div>
      <div class="name">octo<span>·</span>mail</div>
    </div>
    <button id="compose-open" class="compose-btn"><span class="plus">+</span> Compose</button>
    <div class="nav-label">Mailboxes</div>
    <div id="nav" class="nav"></div>
    <div class="sidebar-foot">
      <div id="side-avatar" class="avatar av-gradient">?</div>
      <div class="who">
        <div id="side-user" class="u">—</div>
        <div class="s">signed in</div>
      </div>
      <button id="signout-btn" class="icon-btn" title="Sign out">⏻</button>
    </div>
  </aside>

  <!-- Message list -->
  <section class="list-pane">
    <div class="list-head">
      <div>
        <h2 id="list-title">Inbox</h2>
        <div id="list-sub" class="sub">—</div>
      </div>
      <button id="refresh-btn" class="icon-btn" title="Refresh">↻</button>
    </div>
    <div id="list" class="list-scroll scroll"></div>
  </section>

  <!-- Reader -->
  <section class="reader-pane">
    <div id="reader-empty" class="reader-empty">
      <div>
        <div class="big">✉</div>
        <div class="hint">Select a message to read</div>
      </div>
    </div>
    <div id="reader">
      <div class="reader-head">
        <h1 id="reader-subject"></h1>
        <div class="reader-meta">
          <div id="reader-av" class="av av-gradient">?</div>
          <div>
            <div id="reader-from" class="mfrom"></div>
            <div id="reader-fromaddr" class="maddr"></div>
          </div>
          <div id="reader-to" class="mto"></div>
        </div>
      </div>
      <div id="reader-body" class="reader-body scroll"></div>
    </div>
  </section>
</div>

<!-- Compose modal -->
<div id="compose-scrim" class="modal-scrim">
  <div class="compose">
    <div class="compose-head">
      <h3>New message</h3>
      <button id="compose-close" class="icon-btn">✕</button>
    </div>
    <div class="compose-body scroll">
      <div class="line"><label for="to">To</label><input id="to" type="text" placeholder="recipient@example.com"></div>
      <div class="line"><label for="subject">Subject</label><input id="subject" type="text" placeholder="Subject"></div>
      <textarea id="compose-text" placeholder="Write your message…"></textarea>
    </div>
    <div class="compose-foot">
      <button id="send-btn" class="btn-send">Send</button>
      <button id="compose-cancel" class="btn-ghost">Discard</button>
      <div id="send-status" class="status"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
